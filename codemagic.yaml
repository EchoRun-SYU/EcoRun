workflows:
  android-workflow:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - android_signing
        - api_keys
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Decode keystore
        script: |
          python3 -c "
import base64, os, sys
raw = os.environ.get('KEYSTORE_BASE64', '')
if not raw or raw.startswith('\$'):
    print('ERROR: KEYSTORE_BASE64 is not set in Codemagic environment variables', file=sys.stderr)
    sys.exit(1)
data = base64.b64decode(raw)
if len(data) < 100:
    print(f'ERROR: Decoded keystore is too small ({len(data)} bytes) — bad base64?', file=sys.stderr)
    sys.exit(1)
out = '$CM_BUILD_DIR/ecorun-release.jks'
open(out, 'wb').write(data)
print(f'Keystore decoded: {len(data)} bytes -> {out}')
"
          echo "KEYSTORE_PATH=$CM_BUILD_DIR/ecorun-release.jks" >> $CM_ENV
          keytool -list -keystore "$CM_BUILD_DIR/ecorun-release.jks" \
            -storepass "$KEYSTORE_PASSWORD" -storetype PKCS12 2>&1 | head -5
      - name: Build APK
        script: flutter build apk --release
      - name: Build App Bundle
        script: flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - yearsingle@gmail.com
        notify:
          success: true
          failure: true

  ios-sideload-workflow:
    name: iOS Sideload Build (무서명 — Sideloadly로 로컬 서명)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      groups:
        - api_keys
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Generate LocalConfig.swift
        script: |
          cat > ios/Runner/LocalConfig.swift <<EOF
          struct LocalConfig {
              static let googleMapsAPIKey = "$MAPS_API_KEY"
          }
          EOF
      - name: Build iOS (unsigned)
        script: flutter build ios --release --no-codesign
      - name: Package as unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r EcoRun-unsigned.ipa Payload/
    artifacts:
      - build/ios/iphoneos/EcoRun-unsigned.ipa
    publishing:
      email:
        recipients:
          - yearsingle@gmail.com
        notify:
          success: true
          failure: true
