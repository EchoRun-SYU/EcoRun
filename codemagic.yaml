workflows:
  android-workflow:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - android_signing
        - api_keys
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Decode keystore
        script: |
          python3 -c "import base64, os; open('$CM_BUILD_DIR/ecorun-release.jks', 'wb').write(base64.b64decode(os.environ['KEYSTORE_BASE64']))"
          echo "KEYSTORE_PATH=$CM_BUILD_DIR/ecorun-release.jks" >> $CM_ENV
      - name: Build APK
        script: flutter build apk --release
      - name: Build App Bundle
        script: flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - yearsingle@gmail.com
        notify:
          success: true
          failure: true

  ios-sideload-workflow:
    name: iOS Sideload Build (무서명 — Sideloadly로 로컬 서명)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      groups:
        - api_keys
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Generate LocalConfig.swift
        script: |
          cat > ios/Runner/LocalConfig.swift <<EOF
          struct LocalConfig {
              static let googleMapsAPIKey = "$MAPS_API_KEY"
          }
          EOF
      - name: Build iOS (unsigned)
        script: flutter build ios --release --no-codesign
      - name: Package as unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r EcoRun-unsigned.ipa Payload/
    artifacts:
      - build/ios/iphoneos/EcoRun-unsigned.ipa
    publishing:
      email:
        recipients:
          - yearsingle@gmail.com
        notify:
          success: true
          failure: true
