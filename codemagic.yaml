workflows:
  android-workflow:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        MAPS_API_KEY: $MAPS_API_KEY
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
      - name: Build App Bundle
        script: flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - yearsingle@gmail.com
        notify:
          success: true
          failure: true

  ios-sideload-workflow:
    name: iOS Sideload Build (무서명 — Sideloadly로 로컬 서명)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      vars:
        MAPS_API_KEY: $MAPS_API_KEY
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build iOS (unsigned)
        script: flutter build ios --release --no-codesign
      - name: Package as unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r EcoRun-unsigned.ipa Payload/
    artifacts:
      - build/ios/iphoneos/EcoRun-unsigned.ipa
    publishing:
      email:
        recipients:
          - yearsingle@gmail.com
        notify:
          success: true
          failure: true
